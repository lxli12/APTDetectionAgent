schema_version: configuration_space_v1
dataset: CLEARSCOPE_E3
expected_configuration_count: 311

frozen:
  construction:
    time_window_size_minutes: 15
  reproducibility:
    seed: 42
  threshold:
    space_version: pids_tree_validation_v1
  scoring:
    edge_objective: max_incident_edge_loss
    node_objective: direct_node_loss

hyperparameter_sources:
  flash: [PIDSMaker/config/flash.yml]
  kairos: [PIDSMaker/config/kairos.yml]
  magic: [PIDSMaker/config/magic.yml]
  nodlink: [PIDSMaker/config/nodlink.yml]
  orthrus_non_snooped:
    - PIDSMaker/config/orthrus.yml
    - PIDSMaker/config/orthrus_non_snooped.yml
  rcaid: [PIDSMaker/config/rcaid.yml]
  threatrace: [PIDSMaker/config/threatrace.yml]
  velox:
    - PIDSMaker/config/orthrus.yml
    - PIDSMaker/config/orthrus_non_snooped.yml
    - PIDSMaker/config/velox.yml
  generic_tuning:
    - PIDSMaker/docs/docs/features/tuning.md
    - PIDSMaker/config/flash.yml
    - PIDSMaker/config/kairos.yml
    - PIDSMaker/config/magic.yml
    - PIDSMaker/config/nodlink.yml
    - PIDSMaker/config/orthrus.yml
    - PIDSMaker/config/orthrus_non_snooped.yml
    - PIDSMaker/config/rcaid.yml
    - PIDSMaker/config/threatrace.yml
    - PIDSMaker/config/velox.yml
    - PIDSMaker/config/experiments/tuning/components/tuning_featurization_methods.yml
    - PIDSMaker/config/experiments/tuning/systems/default/tuning_default_baselines.yml
    - PIDSMaker/config/experiments/tuning/systems/default/tuning_orthrus_fixed.yml
    - PIDSMaker/config/experiments/tuning/systems/clearscope_e5/tuning_orthrus.yml

# Every listed space is exhaustively expanded. Coupled model-capacity values avoid
# invalid emb_dim/hidden_dim combinations while exposing 3-5 values per numeric
# decision field. Fixed numeric settings are execution constants, not choices.
pids_spaces:
  flash:
    base_model: flash
    scoring: direct_node_loss
    coverage: full_factorial
    score_channel: flash_confidence
    threshold:
      method:
        values: [validation_quantile, max_val_loss, mean_val_loss]  # PIDSMaker default: flash with fixed scalar 0.53 (reference only)
      value:
        when: {method: validation_quantile}
        values: [0.90, 0.95, 0.99]  # project default: 0.95; no upstream quantile default
    sources: [flash, generic_tuning]
    base_values:
      featurization.used_method: flash
    fixed_overrides:
      featurization.epochs: 10  # PIDSMaker default: 10
      training.node_out_dim: 3  # PIDSMaker default: 3
      training.weight_decay: 0.0005  # PIDSMaker default: 0.0005
      training.num_epochs: 12  # PIDSMaker default: 12
    coupled_parameters:
      model_capacity:
        values:
          - {featurization.emb_dim: 30, training.node_hid_dim: 30}  # PIDSMaker default
          - {featurization.emb_dim: 32, training.node_hid_dim: 32}
          - {featurization.emb_dim: 32, training.node_hid_dim: 64}
          - {featurization.emb_dim: 128, training.node_hid_dim: 128}
          - {featurization.emb_dim: 256, training.node_hid_dim: 256}
    parameters:
      featurization.used_method:
        values: [flash, fasttext, word2vec]  # PIDSMaker default: flash
      training.lr:
        values: [0.01, 0.001, 0.0001, 0.00001]  # PIDSMaker default: 0.01
    legacy_configuration_aliases:  # internal compatibility; not Agent-selectable values
      flash_base: {featurization.emb_dim: 30, training.node_hid_dim: 30, featurization.used_method: flash, training.lr: 0.01}
      flash_wide: {featurization.emb_dim: 128, training.node_hid_dim: 128, featurization.used_method: flash, training.lr: 0.001}

  kairos:
    base_model: kairos
    scoring: max_incident_edge_loss
    coverage: full_factorial
    score_channel: objective_loss
    threshold:
      method:
        values: [validation_quantile, max_val_loss, mean_val_loss]  # PIDSMaker default: max_val_loss
      value:
        when: {method: validation_quantile}
        values: [0.90, 0.95, 0.99]  # project default: 0.95
    sources: [kairos, generic_tuning]
    base_values:
      featurization.used_method: hierarchical_hashing
    fixed_overrides:
      training.weight_decay: 0.01  # PIDSMaker default: 0.01
      training.num_epochs: 12  # PIDSMaker default: 12
    coupled_parameters:
      model_capacity:
        values:
          - {featurization.emb_dim: 16, training.node_hid_dim: 100, training.node_out_dim: 100}  # PIDSMaker default
          - {featurization.emb_dim: 32, training.node_hid_dim: 128, training.node_out_dim: 128}
          - {featurization.emb_dim: 32, training.node_hid_dim: 64, training.node_out_dim: 64}
          - {featurization.emb_dim: 128, training.node_hid_dim: 128, training.node_out_dim: 128}
          - {featurization.emb_dim: 256, training.node_hid_dim: 256, training.node_out_dim: 256}
    parameters:
      featurization.used_method:
        values: [hierarchical_hashing, fasttext, word2vec]  # PIDSMaker default: hierarchical_hashing
        conditional_overrides:
          fasttext: {featurization.epochs: 50}
          word2vec: {featurization.epochs: 50}
      training.lr:
        values: [0.01, 0.001, 0.0001, 0.00005, 0.00001]  # PIDSMaker default: 0.00005
    legacy_configuration_aliases:  # internal compatibility; not Agent-selectable values
      kairos_base: {featurization.emb_dim: 16, training.node_hid_dim: 100, training.node_out_dim: 100, featurization.used_method: hierarchical_hashing, training.lr: 0.00005}
      kairos_wide: {featurization.emb_dim: 32, training.node_hid_dim: 128, training.node_out_dim: 128, featurization.used_method: hierarchical_hashing, training.lr: 0.0001}

  magic:
    base_model: magic
    scoring: direct_node_loss
    score_channel: objective_loss
    coverage: full_factorial
    threshold:
      method:
        values: [validation_quantile, max_val_loss, mean_val_loss]  # PIDSMaker default: magic/test-score mean (reference only)
      value:
        when: {method: validation_quantile}
        values: [0.90, 0.95, 0.99]  # project default: 0.95; no deployable upstream default
    sources: [magic, generic_tuning]
    fixed_overrides:
      training.weight_decay: 0.0005  # PIDSMaker default: 0.0005
      training.num_epochs: 12  # PIDSMaker default: 12
    coupled_parameters:
      model_capacity:
        values:
          - {training.node_hid_dim: 32, training.node_out_dim: 32}
          - {training.node_hid_dim: 64, training.node_out_dim: 64}  # PIDSMaker default
          - {training.node_hid_dim: 128, training.node_out_dim: 128}
          - {training.node_hid_dim: 256, training.node_out_dim: 256}
    parameters:
      training.lr:
        values: [0.01, 0.001, 0.0001, 0.00001]  # PIDSMaker default: 0.001
    legacy_configuration_aliases:  # internal compatibility; not Agent-selectable values
      magic_base: {training.node_hid_dim: 64, training.node_out_dim: 64, training.lr: 0.001}
      magic_wide: {training.node_hid_dim: 128, training.node_out_dim: 128, training.lr: 0.0001}

  nodlink:
    base_model: nodlink
    scoring: direct_node_loss
    coverage: full_factorial
    score_channel: objective_loss
    threshold:
      method:
        values: [validation_quantile, max_val_loss, mean_val_loss]  # PIDSMaker default: validation_quantile
      value:
        when: {method: validation_quantile}
        values: [0.90, 0.95, 0.99]  # PIDSMaker default: 0.90
    sources: [nodlink, generic_tuning]
    base_values:
      featurization.used_method: fasttext
    fixed_overrides:
      featurization.epochs: 100  # PIDSMaker default: 100
      training.weight_decay: 0.00001  # PIDSMaker default: 0.00001
      training.num_epochs: 12  # PIDSMaker default: 12
    coupled_parameters:
      model_capacity:
        values:
          - {featurization.emb_dim: 32, training.node_hid_dim: 32, training.node_out_dim: 32}
          - {featurization.emb_dim: 32, training.node_hid_dim: 64, training.node_out_dim: 64}
          - {featurization.emb_dim: 128, training.node_hid_dim: 128, training.node_out_dim: 128}
          - {featurization.emb_dim: 256, training.node_hid_dim: 256, training.node_out_dim: 256}  # PIDSMaker default
    parameters:
      featurization.used_method:
        values: [fasttext, word2vec]  # PIDSMaker default: fasttext
      training.lr:
        values: [0.01, 0.001, 0.0001, 0.00001]  # PIDSMaker default: 0.001
    legacy_configuration_aliases:  # internal compatibility; not Agent-selectable values
      nodlink_base: {featurization.emb_dim: 256, training.node_hid_dim: 256, training.node_out_dim: 256, featurization.used_method: fasttext, training.lr: 0.001}
      nodlink_compact: {featurization.emb_dim: 128, training.node_hid_dim: 128, training.node_out_dim: 128, featurization.used_method: fasttext, training.lr: 0.0001}

  orthrus:
    base_model: orthrus_non_snooped
    scoring: max_incident_edge_loss
    coverage: full_factorial
    score_channel: objective_loss
    threshold:
      method:
        values: [validation_quantile, max_val_loss, mean_val_loss]  # PIDSMaker default: max_val_loss
      value:
        when: {method: validation_quantile}
        values: [0.90, 0.95, 0.99]  # project default: 0.95
    sources: [orthrus_non_snooped, generic_tuning]
    base_values:
      featurization.used_method: word2vec
    fixed_overrides:
      featurization.epochs: 50  # PIDSMaker default: 50
      training.weight_decay: 0.00001  # PIDSMaker default: 0.00001
      training.num_epochs: 12  # PIDSMaker default: 12
    coupled_parameters:
      model_capacity:
        values:
          - {featurization.emb_dim: 32, training.node_hid_dim: 64, training.node_out_dim: 64}
          - {featurization.emb_dim: 32, training.node_hid_dim: 32, training.node_out_dim: 32}
          - {featurization.emb_dim: 128, training.node_hid_dim: 128, training.node_out_dim: 128}  # PIDSMaker default
          - {featurization.emb_dim: 256, training.node_hid_dim: 256, training.node_out_dim: 256}
    parameters:
      featurization.used_method:
        values: [word2vec, fasttext]  # PIDSMaker default: word2vec
      training.lr:
        values: [0.01, 0.001, 0.0001, 0.00001]  # orthrus_non_snooped default: 0.0001
    legacy_configuration_aliases:  # internal compatibility; not Agent-selectable values
      orthrus_base: {featurization.emb_dim: 128, training.node_hid_dim: 128, training.node_out_dim: 128, featurization.used_method: word2vec, training.lr: 0.0001}
      orthrus_compact: {featurization.emb_dim: 32, training.node_hid_dim: 64, training.node_out_dim: 64, featurization.used_method: word2vec, training.lr: 0.0001}

  rcaid:
    base_model: rcaid
    scoring: direct_node_loss
    coverage: full_factorial
    score_channel: objective_loss
    threshold:
      method:
        values: [validation_quantile, max_val_loss, mean_val_loss]  # PIDSMaker default: max_val_loss
      value:
        when: {method: validation_quantile}
        values: [0.90, 0.95, 0.99]  # project default: 0.95
    sources: [rcaid, generic_tuning]
    base_values:
      featurization.used_method: doc2vec
    fixed_overrides:
      featurization.epochs: 5  # PIDSMaker default: 5
      training.node_out_dim: 3  # PIDSMaker default: 3
      training.weight_decay: 0.0001  # PIDSMaker default: 0.0001
      training.num_epochs: 12  # PIDSMaker default: 12
    coupled_parameters:
      model_capacity:
        values:
          - {featurization.emb_dim: 32, training.node_hid_dim: 64}
          - {featurization.emb_dim: 32, training.node_hid_dim: 32}
          - {featurization.emb_dim: 128, training.node_hid_dim: 128}  # PIDSMaker default
          - {featurization.emb_dim: 256, training.node_hid_dim: 256}
    parameters:
      featurization.used_method:
        values: [doc2vec, fasttext, word2vec]  # PIDSMaker default: doc2vec
      training.lr:
        values: [0.01, 0.001, 0.0001, 0.00001]  # PIDSMaker default: 0.0001
    legacy_configuration_aliases:  # internal compatibility; not Agent-selectable values
      rcaid_base: {featurization.emb_dim: 128, training.node_hid_dim: 128, featurization.used_method: doc2vec, training.lr: 0.0001}
      rcaid_compact: {featurization.emb_dim: 32, training.node_hid_dim: 64, featurization.used_method: doc2vec, training.lr: 0.001}

  threatrace:
    base_model: threatrace
    scoring: direct_node_loss
    coverage: full_factorial
    score_channel: threatrace_ratio
    threshold:
      method:
        values: [validation_quantile, max_val_loss, mean_val_loss]  # PIDSMaker default: threatrace with fixed scalar 1.5 (reference only)
      value:
        when: {method: validation_quantile}
        values: [0.90, 0.95, 0.99]  # project default: 0.95; no upstream quantile default
    sources: [threatrace, generic_tuning]
    fixed_overrides:
      training.node_out_dim: 3  # PIDSMaker default: 3
      training.weight_decay: 0.0005  # PIDSMaker default: 0.0005
      training.num_epochs: 12  # PIDSMaker default: 12
    coupled_parameters:
      model_capacity:
        values:
          - {training.node_hid_dim: 32}  # PIDSMaker default
          - {training.node_hid_dim: 64}
          - {training.node_hid_dim: 128}
          - {training.node_hid_dim: 256}
    parameters:
      training.lr:
        values: [0.01, 0.001, 0.0001, 0.00001]  # PIDSMaker default: 0.01
    legacy_configuration_aliases:  # internal compatibility; not Agent-selectable values
      threatrace_base: {training.node_hid_dim: 32, training.lr: 0.01}
      threatrace_wide: {training.node_hid_dim: 64, training.lr: 0.001}

  velox:
    base_model: velox
    scoring: max_incident_edge_loss
    coverage: full_factorial
    score_channel: objective_loss
    threshold:
      method:
        values: [validation_quantile, max_val_loss, mean_val_loss]  # PIDSMaker default: max_val_loss inherited from Orthrus
      value:
        when: {method: validation_quantile}
        values: [0.90, 0.95, 0.99]  # project default: 0.95
    sources: [velox, generic_tuning]
    base_values:
      featurization.used_method: word2vec
    fixed_overrides:
      featurization.epochs: 50  # PIDSMaker default inherited from Orthrus: 50
      training.weight_decay: 0.00001  # PIDSMaker default inherited from Orthrus: 0.00001
      training.num_epochs: 12  # PIDSMaker default inherited from Orthrus: 12
    coupled_parameters:
      model_capacity:
        values:
          - {featurization.emb_dim: 32, training.node_hid_dim: 64, training.node_out_dim: 64}
          - {featurization.emb_dim: 32, training.node_hid_dim: 32, training.node_out_dim: 32}
          - {featurization.emb_dim: 128, training.node_hid_dim: 128, training.node_out_dim: 128}  # PIDSMaker default inherited from orthrus_non_snooped
          - {featurization.emb_dim: 256, training.node_hid_dim: 256, training.node_out_dim: 256}
    parameters:
      featurization.used_method:
        values: [word2vec, fasttext]  # PIDSMaker default: word2vec
      training.lr:
        values: [0.01, 0.001, 0.0001, 0.00001]  # PIDSMaker default: 0.0001
    legacy_configuration_aliases:  # internal compatibility; not Agent-selectable values
      velox_base: {featurization.emb_dim: 128, training.node_hid_dim: 128, training.node_out_dim: 128, featurization.used_method: word2vec, training.lr: 0.0001}
      velox_compact: {featurization.emb_dim: 32, training.node_hid_dim: 64, training.node_out_dim: 64, featurization.used_method: word2vec, training.lr: 0.001}
